<!doctype html>
<html>
  <head>
    <title>LIFT Classroom Automation</title>
  </head>
  <body>
    <h1>LIFT Classroom Automation</h1>

    <form action="/preview" method="post" enctype="multipart/form-data">
      <label>Select Google Classroom class:</label>
      <br /><br />

      <select name="course_id" required>
        <option value="">-- Choose a class --</option>
        {% for course in courses %}
        <option value="{{ course.id }}">
          {{ course.name }} ({{ course.id }})
        </option>
        {% endfor %}
      </select>

      {% if courses_error %}
      <p style="color: red">
        Unable to load classes from Google Classroom: {{ courses_error }}
      </p>
      {% endif %}

      <br /><br />

      <label>Select syllabus PDF:</label>
      <br /><br />

      <input type="file" name="file" required />

      <br /><br />

      <label>
        <input type="checkbox" name="allow_openai" value="yes" />
        Allow OpenAI API usage if needed
      </label>

      <p>
        Leave this unchecked to force local Ollama only. Check it if you want
        this run to be allowed to use your OpenAI API key.
      </p>

      <br />

      <button type="submit">Preview Assignments</button>
    </form>
  </body>
</html>
